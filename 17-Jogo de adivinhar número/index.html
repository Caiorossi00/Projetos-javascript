<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de Adivinhar Número</title>
  </head>
  <body>
    <h2>Adivinhe o Número</h2>

    <input
      type="number"
      id="palpite"
      placeholder="Digite seu palpite (1-9)"
      min="1"
      max="9"
    />
    <button onclick="jogar()">Jogar</button>

    <p id="resultado">Clique no botão para jogar</p>

    <script src="script.js"></script>
  </body>
</html>
